services:
  meme-indexer-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meme-indexer-mcp
    restart: unless-stopped
    environment:
      MEME_INDEXER_CONFIG: /app/config.toml
      FASTMCP_CHECK_FOR_UPDATES: off
      FASTMCP_TRANSPORT: streamable-http
      FASTMCP_HOST: 0.0.0.0
      FASTMCP_PORT: "8000"
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - /mnt/nas-data/homes/sagar_ap/Memes:/mnt/nas-data/homes/sagar_ap/Memes:ro
    networks:
      mcp_shared:
        aliases:
          - meme-indexer-mcp
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; s=socket.create_connection(('127.0.0.1', 8000), 5); s.close()"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  mcp_shared:
    external: true
